apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-bun
  labels:
    app: hello-bun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-bun
  template:
    metadata:
      labels:
        app: hello-bun
    spec:
      containers:
        - name: hello-bun
          image: hello-bun:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-bun
  labels:
    app: hello-bun
spec:
  type: NodePort
  selector:
    app: hello-bun
  ports:
    - name: http
      port: 9080
      targetPort: 8080
      nodePort: 30080
